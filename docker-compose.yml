services:
  mysql:
    image: mysql:8.4
    container_name: logiraf-mysql
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: logiraf
      MYSQL_USER: logiraf
      MYSQL_PASSWORD: logiraf_dev
      MYSQL_ROOT_PASSWORD: root_dev
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10
      start_period: 20s

  backend:
    build: ./backend
    container_name: logiraf-backend
    expose:
      - "8000"
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=1
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=logiraf
      - MYSQL_USER=logiraf
      - MYSQL_PASSWORD=logiraf_dev
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: logiraf-frontend
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: logiraf-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  mysql_data:
